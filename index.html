<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 11 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    
    <button id="mem1-button">Memory #1</button> <br>
    <button id="mem2-button">Memory #2</button>
    <button id="mem3-button">Memory #3</button>
    <h1>3 Foods <span>I like</span></h1>
    <ol>
      <li>
        <h3 id="mem1">Memory #1</h3>
        <p class="info">More about this memory.</p>
        <img id="photo1" src="https://cdn.prod.website-files.com/65e2ec4e51f6693a3af9151d/6607b53c77f6c38c679a3ff5_23f5513f-885d-47b8-a11f-8d723d5266c2.webp" width="200">
      </li>

      <li>
        <h3 id="mem2">Memory #2</h3>
        <p class="info2">More about this memory.</p>
         <img id="photo2" src="https://www.simplyrecipes.com/thmb/4zGGwwOWJLNMpfAisLa9AF1IXnM=/1500x0/filters:no_upscale():max_bytes(150000):strip_icc()/DSC_0540copy2-0e89604d26254c1b9fcd42f69e4066cb.jpg" width="200">
      </li>

      <li>
        <h3 id="mem3">Memory #3</h3>
        <p class="info3">More about this memory</p>
        <img id="photo3" src="https://cdn.loveandlemons.com/wp-content/uploads/2024/12/caesar-salad.jpg" width="200">
      </li>
    </ol>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
$("img"). hide()
$("p"). hide()
      // ======================== Button #1
      $("#mem1-button").click(function () {
        $("#mem1").css("color", "purple");
        $("#photo1"). show(2000)
$(".info"). show(2000)

      });

      // ======================== Button #2
      $("#mem2-button").click(function () {
        $("#mem2").css("color", "blue");
        $("#photo2"). show(2000)
$(".info2"). show(2000)

      });

      // ======================== Button #3
      $("#mem3-button").click(function () {
        $("#mem3").css("color", "green");
        $("#mem3").text("Coding Parties! 🎉");
        $("#photo3"). show(2000)
        $(".info3"). show(2000)

      });


    </script>
  </body>
</html>
